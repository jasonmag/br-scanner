service: br-scanner
image: jasonmaglangit/br-scanner

builder:
  arch: amd64

ssh:
  user: ubuntu

servers:
  web:
    hosts:
      - nexstar

proxy:
  ssl: true
  host: scanner.jasonmag.com
  app_port: 3000
  healthcheck:
    path: /api/health
    interval: 10
    timeout: 5

registry:
  server: docker.io
  username: <%= ENV.fetch("KAMAL_REGISTRY_USERNAME") %>
  password: <%= ENV.fetch("KAMAL_REGISTRY_PASSWORD") %>

env:
  clear:
    NODE_ENV: production
    PORT: "3000"
    BARCODE_DECODER_URL: http://127.0.0.1:8000
    NEXT_PUBLIC_APP_NAME: Barcode Scanner
    NEXT_PUBLIC_ENABLE_AI_ASSIST: "false"
    NEXT_PUBLIC_ENABLE_DEBUG: "false"
